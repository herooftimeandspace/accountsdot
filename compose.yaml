services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: provisioner
      POSTGRES_USER: provisioner
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U provisioner -d provisioner"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: golang:1.26.3
    working_dir: /workspace
    command: sleep infinity
    environment:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    env_file:
      - .env
    volumes:
      - .:/workspace
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    image: golang:1.26.3
    working_dir: /workspace
    command: sleep infinity
    environment:
      PATH: /usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    env_file:
      - .env
    volumes:
      - .:/workspace
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
