name: release-prep-check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  pull-requests: read

jobs:
  release-prep-check:
    name: release-prep-check
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      GH_PR_NUMBER: ${{ github.event.pull_request.number }}
      GH_HEAD_REF: ${{ github.event.pull_request.head.ref }}
      GH_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
    steps:
      - name: Check out promotion candidate
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Verify main promotion readiness
        run: |
          set -euo pipefail

          if [ "${GH_HEAD_REPO}" != "${GH_REPO}" ]; then
            echo "main promotion PRs must come from the same repository so release-prep blockers run."
            exit 1
          fi

          if [ "${GH_HEAD_REF}" != "promote/staging-to-main" ]; then
            echo "main accepts normal promotion through promote/staging-to-main only."
            exit 1
          fi

          git fetch origin staging
          if ! git merge-base --is-ancestor origin/staging HEAD; then
            echo "The main promotion candidate does not contain the latest staging tip."
            exit 1
          fi

          committed_dist="$(git ls-files frontend/dist || true)"
          if [ -n "${committed_dist}" ]; then
            echo "frontend/dist is generated build output and must not be committed as release evidence."
            printf '%s\n' "${committed_dist}"
            exit 1
          fi

          body="$(gh pr view "${GH_PR_NUMBER}" --repo "${GH_REPO}" --json body --jq '.body')"
          for label in "External promotion runbook:" "IncidentIQ testing ticket:" "Release/deployment metadata:"; do
            line="$(printf '%s\n' "${body}" | grep -F "${label}" | head -n 1 || true)"
            if [ -z "${line}" ]; then
              echo "PR body must include ${label}"
              exit 1
            fi
            if printf '%s\n' "${line}" | grep -Eiq 'REQUIRED BEFORE MERGE|TBD|TODO|missing'; then
              echo "PR body still has an unresolved release-readiness placeholder for ${label}"
              exit 1
            fi
          done
